# pr_check.yml — Pull Request Status Check
# ==========================================
# This workflow adds a PR comment summarising test results
# so reviewers can see pass/fail at a glance without
# opening the Actions tab.

name: PR Test Summary

on:
  pull_request:
    branches:
      - main

jobs:
  pr-summary:
    name: PR Test Summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests and capture output
        id: tests
        run: |
          python -m pytest tests/ -v --tb=short 2>&1 | tee test_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post test summary as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('test_output.txt', 'utf8');
            const lines = output.split('\n');
            const summary = lines[lines.length - 3] || 'No summary available';
            const passed = output.includes('passed');
            const emoji = passed ? '✅' : '❌';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} CI Test Results\n\`\`\`\n${summary}\n\`\`\`\n\n${passed ? 'All tests passed. Ready to merge! 🎉' : 'Tests failed. Please fix before merging. 🚫'}`
            });
